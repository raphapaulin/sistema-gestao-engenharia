<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sistema de Gestão de Engenharia{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-xl bg-white border-bottom sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand brand-mark" href="/">
          <span class="brand-logo-wrap">
            <span class="brand-symbol">SGE</span>
          </span>
          <span>
            <strong>SGE Demo</strong>
            <small>Gestão de Engenharia</small>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Alternar navegação"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto align-items-xl-center gap-xl-1">
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" {% if active_page == 'dashboard' %}aria-current="page"{% endif %} href="/">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'clientes' %}active{% endif %}" {% if active_page == 'clientes' %}aria-current="page"{% endif %} href="/clientes">Clientes</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'colaboradores' %}active{% endif %}" {% if active_page == 'colaboradores' %}aria-current="page"{% endif %} href="/colaboradores">Colaboradores</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'servicos' %}active{% endif %}" {% if active_page == 'servicos' %}aria-current="page"{% endif %} href="/servicos">Serviços</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'ordens' %}active{% endif %}" {% if active_page == 'ordens' %}aria-current="page"{% endif %} href="/ordens">Ordens</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'pagamentos' %}active{% endif %}" {% if active_page == 'pagamentos' %}aria-current="page"{% endif %} href="/pagamentos">Pagamentos</a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle {% if active_page in ['atividades', 'cronograma', 'disponibilidade', 'performance'] %}active{% endif %}"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Operação
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item {% if active_page == 'atividades' %}active{% endif %}" href="/atividades">Atividades</a></li>
                <li><a class="dropdown-item {% if active_page == 'cronograma' %}active{% endif %}" href="/cronograma">Cronograma</a></li>
                <li><a class="dropdown-item {% if active_page == 'disponibilidade' %}active{% endif %}" href="/disponibilidade">Disponibilidade</a></li>
                <li><a class="dropdown-item {% if active_page == 'performance' %}active{% endif %}" href="/performance">Performance</a></li>
              </ul>
            </li>

            <li class="nav-item ms-xl-2">
              <a class="btn btn-outline-secondary btn-sm logout-link" href="/logout">Sair</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
