<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Gestão de Engenharia | Login</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-label="Acesso ao sistema interno">
        <div class="login-logo-area">
          <span class="brand-symbol login-symbol">SGE</span>
        </div>

        <header class="login-header">
          <p class="section-kicker mb-2">Versão demo</p>
          <h1>Sistema de Gestão de Engenharia</h1>
          <p>Gestão de Ordens de Serviço</p>
        </header>

        {% if error %}
        <div class="alert alert-danger login-alert" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
          <input type="hidden" name="next_url" value="{{ next_url }}">
          <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control" id="email" name="email" type="email" autocomplete="username" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label" for="senha">Senha</label>
            <input class="form-control" id="senha" name="senha" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
      </section>
    </main>
  </body>
</html>
